<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>oTools</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Top bar: left logo+text, right status indicator and settings button -->
      <div class="topbar">
        <div class="topbar-left">
          <i class="fas fa-wrench"></i>
          <span class="topbar-title">oTools</span>
          <div class="status-indicator" id="statusIndicator" title="App Status">
            <i class="fas fa-circle"></i>
          </div>
        </div>
        <div class="topbar-right">
          <button class="status-btn" id="statusBtn" title="App Status">
            <i class="fas fa-chart-line"></i>
          </button>
          <button class="performance-btn" id="performanceBtn" title="Performance Monitor">
            <i class="fas fa-tachometer-alt"></i>
          </button>
          <button class="settings-btn" id="settingsBtn" title="Settings">
            <i class="fas fa-cog"></i>
          </button>
        </div>
      </div>

      <!-- Search section -->
      <div class="search-section">
        <div class="search-container">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="searchInput" placeholder="Search features or plugins..." class="search-input" />
          <button class="search-btn" id="searchBtn">
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <!-- Quick actions section - dynamically generated -->
      <div class="quick-actions">
        <div class="action-grid" id="actionGrid">
          <!-- Quick action buttons will be generated here dynamically -->
        </div>
      </div>

      <!-- Plugin management section -->
      <div class="plugins-section" id="pluginsSection" style="display: none;">
        <div class="plugins-header">
          <h3>Plugin Management</h3>
          <button class="close-panel-btn" data-panel="pluginsSection">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="plugins-grid" id="pluginsGrid">
          <!-- Plugin list will be generated here dynamically -->
        </div>
      </div>

      <!-- App status panel -->
      <div class="panel" id="statusPanel" style="display: none;">
        <div class="panel-header">
          <h3>App Status</h3>
          <button class="close-panel-btn" data-panel="statusPanel">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="panel-content">
          <!-- Status content will be generated here dynamically -->
        </div>
      </div>

      <!-- Performance monitor panel -->
      <div class="panel" id="performancePanel" style="display: none;">
        <div class="panel-header">
          <h3>Performance Monitor</h3>
          <button class="close-panel-btn" data-panel="performancePanel">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="panel-content">
          <div class="performance-metrics">
            <div class="metric-item">
              <label>CPU Usage:</label>
              <span id="cpuUsage">--</span>
            </div>
            <div class="metric-item">
              <label>Memory Usage:</label>
              <span id="memoryUsage">--</span>
            </div>
            <div class="metric-item">
              <label>Response Time:</label>
              <span id="responseTime">--</span>
            </div>
          </div>
          <div class="performance-chart" id="performanceChart">
            <!-- Performance chart will be displayed here -->
          </div>
        </div>
      </div>

      <!-- Clipboard panel -->
      <div class="panel" id="clipboardPanel" style="display: none;">
        <div class="panel-header">
          <h3>Clipboard Management</h3>
          <button class="close-panel-btn" data-panel="clipboardPanel">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="panel-content">
          <div class="clipboard-controls">
            <button id="readClipboardBtn">Read Clipboard</button>
            <button id="clearClipboardBtn">Clear Clipboard</button>
          </div>
          <div class="clipboard-content">
            <textarea id="clipboardText" placeholder="Clipboard content will be displayed here..." readonly></textarea>
          </div>
        </div>
      </div>

      <!-- Settings panel -->
      <div class="panel" id="settingsPanel" style="display: none;">
        <div class="panel-header">
          <h3>Settings</h3>
          <button class="close-panel-btn" data-panel="settingsPanel">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="panel-content">
          <div class="settings-section">
            <h4>App Settings</h4>
            <div class="setting-item">
              <label>Auto Start:</label>
              <input type="checkbox" id="autoStart" />
            </div>
            <div class="setting-item">
              <label>Startup Launch:</label>
              <input type="checkbox" id="startupLaunch" />
            </div>
          </div>
          <div class="settings-section">
            <h4>Shortcut Settings</h4>
            <div class="setting-item">
              <label>Show/Hide:</label>
              <input type="text" id="toggleShortcut" value="Cmd+Shift+Space" readonly />
            </div>
            <div class="setting-item">
              <label>Screenshot:</label>
              <input type="text" id="screenshotShortcut" value="Cmd+Shift+S" readonly />
            </div>
          </div>
          <div class="settings-section">
            <h4>Plugin Settings</h4>
            <div class="setting-item">
              <label>Auto Load Plugins:</label>
              <input type="checkbox" id="autoLoadPlugins" checked />
            </div>
            <div class="setting-item">
              <label>Plugin Hot Reload:</label>
              <input type="checkbox" id="pluginHotReload" checked />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Loading mask -->
    <div class="loading" id="loading" style="display: none;">
      <div class="loading-content">
        <i class="fas fa-spinner fa-spin"></i>
        <p class="loading-text">Processing...</p>
      </div>
    </div>

    <!-- Notification container -->
    <div class="notification-container" id="notificationContainer"></div>

    <script src="index.js"></script>
    <script>
      // Settings button click event
      document.getElementById('settingsBtn').onclick = function() {
        const settingsPanel = document.getElementById('settingsPanel');
        if (settingsPanel) {
          settingsPanel.style.display = 'flex';
        }
      };
    </script>
  </body>
</html>
