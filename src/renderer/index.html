<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>oTools</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Top bar: left logo+text, right status indicator and settings button -->
      <div class="topbar">
        <div class="topbar-left">
          <i class="fas fa-wrench"></i>
          <span class="topbar-title">oTools</span>
          <div class="status-indicator" id="statusIndicator" title="App Status">
            <i class="fas fa-circle"></i>
          </div>
        </div>
        <div class="topbar-right">
          <button class="status-btn" id="statusBtn" title="Application Status">
            <i class="fas fa-chart-line"></i>
          </button>
          <button class="settings-btn" id="settingsBtn" title="Settings">
            <i class="fas fa-cog"></i>
          </button>
        </div>
      </div>

      <!-- Search section -->
      <div class="search-section">
        <div class="search-container">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="searchInput" placeholder="Search features or plugins..." class="search-input" />
          <button class="search-btn" id="searchBtn">
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <!-- Quick actions section - dynamically generated -->
      <div class="quick-actions">
        <div class="action-grid" id="actionGrid">
          <!-- Quick action buttons will be generated here dynamically -->
        </div>
      </div>

      <!-- App status panel -->
      <div class="panel" id="statusPanel" style="display: none;">
        <div class="panel-header">
          <h3>App Status</h3>
          <button class="close-panel-btn" data-panel="statusPanel">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="panel-content">
          <!-- Status content will be generated here dynamically -->
        </div>
      </div>

      <!-- Settings panel -->
      <div class="panel" id="settingsPanel" style="display: none;">
        <div class="panel-header">
          <h3>Settings</h3>
          <button class="close-panel-btn" data-panel="settingsPanel">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="panel-content">
          <!-- Status content will be generated here dynamically -->
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
