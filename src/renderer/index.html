<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>oTools</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- 顶部栏：左侧logo+文字，右侧状态指示器和设置按钮 -->
      <div class="topbar">
        <div class="topbar-left">
          <i class="fas fa-wrench"></i>
          <span class="topbar-title">oTools</span>
          <div class="status-indicator" id="statusIndicator" title="应用状态">
            <i class="fas fa-circle"></i>
          </div>
        </div>
        <div class="topbar-right">
          <button class="status-btn" id="statusBtn" title="应用状态">
            <i class="fas fa-chart-line"></i>
          </button>
          <button class="performance-btn" id="performanceBtn" title="性能监控">
            <i class="fas fa-tachometer-alt"></i>
          </button>
          <button class="settings-btn" id="settingsBtn" title="设置">
            <i class="fas fa-cog"></i>
          </button>
        </div>
      </div>

      <!-- 搜索区域 -->
      <div class="search-section">
        <div class="search-container">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="searchInput" placeholder="搜索功能或插件..." class="search-input" />
          <button class="search-btn" id="searchBtn">
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <!-- 快捷功能区域 - 动态生成 -->
      <div class="quick-actions">
        <div class="action-grid" id="actionGrid">
          <!-- 快捷功能按钮将在这里动态生成 -->
        </div>
      </div>

      <!-- 插件管理区域 -->
      <div class="plugins-section" id="pluginsSection" style="display: none;">
        <div class="plugins-header">
          <h3>插件管理</h3>
          <button class="close-panel-btn" data-panel="pluginsSection">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="plugins-grid" id="pluginsGrid">
          <!-- 插件列表将在这里动态生成 -->
        </div>
      </div>

      <!-- 应用状态面板 -->
      <div class="panel" id="statusPanel" style="display: none;">
        <div class="panel-header">
          <h3>应用状态</h3>
          <button class="close-panel-btn" data-panel="statusPanel">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="panel-content">
          <!-- 状态内容将在这里动态生成 -->
        </div>
      </div>

      <!-- 性能监控面板 -->
      <div class="panel" id="performancePanel" style="display: none;">
        <div class="panel-header">
          <h3>性能监控</h3>
          <button class="close-panel-btn" data-panel="performancePanel">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="panel-content">
          <div class="performance-metrics">
            <div class="metric-item">
              <label>CPU使用率:</label>
              <span id="cpuUsage">--</span>
            </div>
            <div class="metric-item">
              <label>内存使用:</label>
              <span id="memoryUsage">--</span>
            </div>
            <div class="metric-item">
              <label>响应时间:</label>
              <span id="responseTime">--</span>
            </div>
          </div>
          <div class="performance-chart" id="performanceChart">
            <!-- 性能图表将在这里显示 -->
          </div>
        </div>
      </div>

      <!-- 剪贴板面板 -->
      <div class="panel" id="clipboardPanel" style="display: none;">
        <div class="panel-header">
          <h3>剪贴板管理</h3>
          <button class="close-panel-btn" data-panel="clipboardPanel">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="panel-content">
          <div class="clipboard-controls">
            <button id="readClipboardBtn">读取剪贴板</button>
            <button id="clearClipboardBtn">清空剪贴板</button>
          </div>
          <div class="clipboard-content">
            <textarea id="clipboardText" placeholder="剪贴板内容将显示在这里..." readonly></textarea>
          </div>
        </div>
      </div>

      <!-- 设置面板 -->
      <div class="panel" id="settingsPanel" style="display: none;">
        <div class="panel-header">
          <h3>设置</h3>
          <button class="close-panel-btn" data-panel="settingsPanel">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="panel-content">
          <div class="settings-section">
            <h4>应用设置</h4>
            <div class="setting-item">
              <label>自动启动:</label>
              <input type="checkbox" id="autoStart" />
            </div>
            <div class="setting-item">
              <label>开机启动:</label>
              <input type="checkbox" id="startupLaunch" />
            </div>
          </div>
          <div class="settings-section">
            <h4>快捷键设置</h4>
            <div class="setting-item">
              <label>显示/隐藏:</label>
              <input type="text" id="toggleShortcut" value="Cmd+Shift+Space" readonly />
            </div>
            <div class="setting-item">
              <label>截图:</label>
              <input type="text" id="screenshotShortcut" value="Cmd+Shift+S" readonly />
            </div>
          </div>
          <div class="settings-section">
            <h4>插件设置</h4>
            <div class="setting-item">
              <label>自动加载插件:</label>
              <input type="checkbox" id="autoLoadPlugins" checked />
            </div>
            <div class="setting-item">
              <label>插件热重载:</label>
              <input type="checkbox" id="pluginHotReload" checked />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 加载遮罩 -->
    <div class="loading" id="loading" style="display: none;">
      <div class="loading-content">
        <i class="fas fa-spinner fa-spin"></i>
        <p class="loading-text">处理中...</p>
      </div>
    </div>

    <!-- 通知容器 -->
    <div class="notification-container" id="notificationContainer"></div>

    <script src="index.js"></script>
    <script>
      // 设置按钮点击事件
      document.getElementById('settingsBtn').onclick = function() {
        const settingsPanel = document.getElementById('settingsPanel');
        if (settingsPanel) {
          settingsPanel.style.display = 'flex';
        }
      };
    </script>
  </body>
</html>
