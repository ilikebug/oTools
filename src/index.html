<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>oTools</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- 顶部栏：左侧logo+文字，右侧设置按钮 -->
      <div class="topbar">
        <div class="topbar-left">
          <i class="fas fa-wrench"></i>
          <span class="topbar-title">oTools</span>
        </div>
        <button class="settings-btn" id="settingsBtn" title="设置">
          <i class="fas fa-cog"></i>
        </button>
      </div>
      <!-- 搜索区域 -->
      <div class="search-section">
        <div class="search-container">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="searchInput" placeholder="搜索功能或插件..." class="search-input" />
          <button class="search-btn" id="searchBtn">
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <!-- 快捷功能区域 -->
      <div class="quick-actions">
        <div class="action-grid">
          <button class="action-btn" id="ocrBtn" title="OCR文字识别">
            <i class="fas fa-eye"></i>
            <span>OCR识别</span>
          </button>
          <button class="action-btn" id="screenshotBtn" title="截图">
            <i class="fas fa-camera"></i>
            <span>截图</span>
          </button>
          <button class="action-btn" id="clipboardBtn" title="剪贴板管理">
            <i class="fas fa-clipboard"></i>
            <span>剪贴板</span>
          </button>
          <button class="action-btn" id="pluginsBtn" title="插件管理">
            <i class="fas fa-puzzle-piece"></i>
            <span>插件</span>
          </button>
        </div>
      </div>
    </div>
    <script src="renderer.js"></script>
    <script>
      document.getElementById('settingsBtn').onclick = function() {
        // TODO: 打开设置面板
        alert('这里可以打开设置面板');
      };
    </script>
  </body>
</html>
